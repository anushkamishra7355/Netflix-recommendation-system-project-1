services:
  - type: web
    name: netflix-recommendation-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/train_model.py
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: OMDB_API_KEY
        sync: false
